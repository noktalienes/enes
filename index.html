<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cok yakisikli sami hocanın projesi</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #e6ecf0;
            --text-color: #2c3e50;
            --challenge-color: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 650px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .team-inputs {
            display: flex;
            justify-content: space-between;
            gap: 25px;
            margin: 30px 0;
        }

        .team-box { flex: 1; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            resize: none;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        textarea:focus { border-color: var(--primary-color); outline: none; }

        input[type="number"], input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            width: 80%;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 5px;
        }

        button:hover { background-color: #357abd; transform: translateY(-2px); }
        .btn-challenge { background-color: var(--challenge-color); }

        .score-board {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #eee;
        }

        .score-val { font-weight: bold; color: var(--primary-color); font-size: 1.2em; }

        .word-display {
            font-size: 2.8em;
            color: var(--primary-color);
            margin: 20px 0;
            font-weight: 800;
            text-transform: uppercase;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            color: white;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            top: 30px;
            font-size: 16px;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s;
        }

        #toast.show { visibility: visible; opacity: 1; }
        #toast.success { background-color: var(--success-color); }
        #toast.error { background-color: var(--error-color); }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>Team Registration</h1>
        <div class="team-inputs">
            <div class="team-box">
                <h3>Team 1</h3>
                <textarea id="team1-names" placeholder="Alice&#10;Bob"></textarea>
            </div>
            <div class="team-box">
                <h3>Team 2</h3>
                <textarea id="team2-names" placeholder="David&#10;Eve"></textarea>
            </div>
        </div>
        <button onclick="startGame()">Start Challenge</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="score-board">
            <div>Team 1: <span id="score1" class="score-val">0</span></div>
            <div>Round: <span id="round-counter">1</span> / 10</div>
            <div>Team 2: <span id="score2" class="score-val">0</span></div>
        </div>
        
        <div id="turn-text" style="color:var(--secondary-color); font-weight: bold; font-size: 1.2em; margin-bottom: 10px;">Turn: Team 1</div>

        <div id="bet-section">
            <p>Point Wager (10 - 100):</p>
            <input type="number" id="point-bet" min="10" max="100" placeholder="50">
            <br>
            <button onclick="getWord()">Get Word</button>
        </div>

        <div id="choice-section" style="display:none;">
            <h2 id="mode-title" style="color:var(--challenge-color)">CHOOSE MODE:</h2>
            <button onclick="setMode('normal')">Just Translate</button>
            <button class="btn-challenge" onclick="setMode('sentence')">Sentence Challenge (+15 Bonus)</button>
        </div>

        <div id="question-section" style="display: none;">
            <div class="word-display" id="english-word">WORD</div>
            <p id="instruction-text">Translation?</p>
            <input type="text" id="answer-input" placeholder="Type here...">
            <br>
            <button onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-text">Game Over!</h1>
        <h2 id="final-scores"></h2>
        <button onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const wordBank = {
        easy: [
            { en: "apple", tr: "elma" }, { en: "book", tr: "kitap" }, { en: "cat", tr: "kedi" },
            { en: "water", tr: "su" }, { en: "sun", tr: "güneş" }, { en: "chair", tr: "sandalye" },
            { en: "table", tr: "masa" }, { en: "milk", tr: "süt" }, { en: "window", tr: "pencere" },
            { en: "door", tr: "kapı" }, { en: "bird", tr: "kuş" }, { en: "bread", tr: "ekmek" }
        ],
        medium: [
            { en: "journey", tr: "yolculuk" }, { en: "freedom", tr: "özgürlük" }, { en: "bridge", tr: "köprü" },
            { en: "adventure", tr: "macera" }, { en: "mountain", tr: "dağ" }, { en: "experience", tr: "tecrübe" },
            { en: "scientist", tr: "bilim insanı" }, { en: "environment", tr: "çevre" }, { en: "discover", tr: "keşfetmek" },
            { en: "balance", tr: "denge" }, { en: "creative", tr: "yaratıcı" }, { en: "dictionary", tr: "sözlük" }
        ],
        hard: [
            { en: "ubiquitous", tr: "yaygın" }, { en: "ephemeral", tr: "geçici" }, { en: "inevitable", tr: "kaçınılmaz" },
            { en: "vulnerable", tr: "savunmasız" }, { en: "prejudice", tr: "önyargı" }, { en: "extraordinary", tr: "olağanüstü" },
            { en: "enthusiastic", tr: "hevesli" }, { en: "mysterious", tr: "gizemli" }, { en: "perseverance", tr: "azim" },
            { en: "consequence", tr: "sonuç" }, { en: "implementation", tr: "uygulama" }, { en: "hierarchy", tr: "hiyerarşi" }
        ]
    };

    let scores = [0, 0], currentTurn = 0, turnCount = 0, currentWordObj = null, currentPoints = 0, isSentenceMode = false;

    function showToast(message, type = 'success') {
        const t = document.getElementById("toast");
        t.innerText = message;
        t.className = "show " + type;
        setTimeout(() => t.className = "", 3000);
    }

    function switchScreen(hide, show) {
        document.getElementById(hide).classList.remove('active');
        setTimeout(() => document.getElementById(show).classList.add('active'), 400);
    }

    function startGame() {
        if(!document.getElementById('team1-names').value.trim() || !document.getElementById('team2-names').value.trim()){
            showToast("Enter names for both teams!", "error"); return;
        }
        switchScreen('setup-screen', 'game-screen');
        updateUI();
    }

    function getWord() {
        currentPoints = parseInt(document.getElementById('point-bet').value);
        if (isNaN(currentPoints) || currentPoints < 10 || currentPoints > 100) {
            showToast("Wager must be 10-100!", "error"); return;
        }
        let d = currentPoints <= 40 ? "easy" : currentPoints <= 70 ? "medium" : "hard";
        currentWordObj = wordBank[d][Math.floor(Math.random() * wordBank[d].length)];
        
        document.getElementById('bet-section').style.display = 'none';
        document.getElementById('choice-section').style.display = 'block';
        document.getElementById('mode-title').innerText = d === "hard" ? "🔥 HARD WORD! SELECT MODE:" : "CHOOSE MODE:";
    }

    function setMode(m) {
        isSentenceMode = m === 'sentence';
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('question-section').style.display = 'block';
        document.getElementById('english-word').innerText = currentWordObj.en;
        document.getElementById('instruction-text').innerText = isSentenceMode ? "Write a sentence using this word:" : "Turkish translation?";
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    }

    function checkGrammar(s, word) {
        s = s.toLowerCase().trim(); // Cümleyi küçük harfe çevir
        if(!s.includes(word.toLowerCase())) return {res: false, m: "Word missing!"};
        
        const sub = ['i ', 'you ', 'he ', 'she ', 'it ', 'we ', 'they ', 'the ', 'my ', 'this ', 'a ', 'an '];
        const vrb = [' is ', ' are ', ' am ', ' was ', ' were ', ' have ', ' has ', ' can ', ' will ', ' play', ' go', ' feel', ' see', ' like'];
        
        const hasSub = sub.some(x => s.startsWith(x));
        const hasVrb = vrb.some(x => s.includes(x));

        if(s.split(' ').length < 3) return {res: false, m: "Too short!"};
        if(!hasSub && !hasVrb) return {res: false, m: "Bad sentence structure!"};
        return {res: true};
    }

    function checkAnswer() {
        const userVal = document.getElementById('answer-input').value.trim().toLowerCase(); // KÜÇÜK HARF YAPILDI
        const correctTr = currentWordObj.tr.toLowerCase(); // KÜÇÜK HARF YAPILDI

        if (!isSentenceMode) {
            if (userVal === correctTr) {
                scores[currentTurn] += currentPoints;
                showToast(`Correct! +${currentPoints} pts`, "success");
            } else {
                showToast(`Wrong! Correct was: ${currentWordObj.tr}`, "error");
            }
        } else {
            let res = checkGrammar(userVal, currentWordObj.en);
            if(res.res) {
                let bonus = currentPoints + 15;
                scores[currentTurn] += bonus;
                showToast(`Perfect! Bonus: +${bonus} pts`, "success");
            } else {
                scores[currentTurn] -= 10;
                showToast(`Invalid: ${res.m} (-10 pts)`, "error");
            }
        }

        turnCount++;
        currentTurn = currentTurn === 0 ? 1 : 0;
        setTimeout(() => {
            if (turnCount >= 10) endGame();
            else { resetUI(); updateUI(); }
        }, 2000);
    }

    function resetUI() {
        document.getElementById('bet-section').style.display = 'block';
        document.getElementById('question-section').style.display = 'none';
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('point-bet').value = '';
    }

    function updateUI() {
        document.getElementById('score1').innerText = scores[0];
        document.getElementById('score2').innerText = scores[1];
        document.getElementById('turn-text').innerText = "Turn: Team " + (currentTurn + 1);
        document.getElementById('round-counter').innerText = Math.floor(turnCount / 2) + 1;
    }

    function endGame() {
        switchScreen('game-screen', 'result-screen');
        const winTxt = document.getElementById('winner-text');
        if (scores[0] > scores[1]) winTxt.innerText = "🏆 Team 1 Wins! 🏆";
        else if (scores[1] > scores[0]) winTxt.innerText = "🏆 Team 2 Wins! 🏆";
        else winTxt.innerText = "🤝 Draw Game! 🤝";
        document.getElementById('final-scores').innerText = `${scores[0]} - ${scores[1]}`;
    }
</script>

</body>
</html>
