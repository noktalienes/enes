<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cok yakisikli sami hocanın projesi</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #e6ecf0;
            --text-color: #2c3e50;
            --challenge-color: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 650px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .screen { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease-out; }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }

        .team-inputs { display: flex; justify-content: space-between; gap: 25px; margin: 30px 0; }
        .team-box { flex: 1; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }

        textarea {
            width: 100%; height: 120px; padding: 12px;
            border: 2px solid #e1e8ed; border-radius: 10px;
            resize: none; font-size: 14px; transition: border-color 0.3s; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--primary-color); outline: none; }

        input[type="number"], input[type="text"] {
            padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 10px;
            width: 80%; margin-bottom: 20px; font-size: 16px;
        }

        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 12px 28px; border-radius: 25px; cursor: pointer;
            font-size: 16px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 5px;
        }
        button:hover { background-color: #357abd; transform: translateY(-2px); }
        .btn-challenge { background-color: var(--challenge-color); }
        .btn-challenge:hover { background-color: #7d3c98; }

        .score-board {
            display: flex; justify-content: space-around; align-items: center;
            background: #f8f9fa; padding: 15px; border-radius: 10px;
            margin-bottom: 25px; border: 1px solid #eee;
        }
        .score-val { font-weight: bold; color: var(--primary-color); font-size: 1.2em; }

        .word-display {
            font-size: 2.8em; color: var(--primary-color);
            margin: 20px 0; font-weight: 800; text-transform: uppercase;
        }

        #toast {
            visibility: hidden; min-width: 250px; color: white; text-align: center;
            border-radius: 10px; padding: 16px; position: fixed; z-index: 1000;
            right: 30px; top: 30px; font-size: 16px; font-weight: 600;
            opacity: 0; transition: 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; }
        #toast.success { background-color: var(--success-color); }
        #toast.error { background-color: var(--error-color); }

        .checking-overlay {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.92); border-radius: 20px;
            justify-content: center; align-items: center; flex-direction: column; gap: 14px;
            z-index: 10;
        }
        .checking-overlay.show { display: flex; }
        .spinner {
            width: 38px; height: 38px; border: 3px solid #e1e8ed;
            border-top-color: var(--challenge-color); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .checking-text { color: var(--challenge-color); font-weight: 600; font-size: 15px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <div class="checking-overlay" id="checking-overlay">
        <div class="spinner"></div>
        <div class="checking-text">AI cümleyi kontrol ediyor...</div>
    </div>

    <div id="setup-screen" class="screen active">
        <h1>Team Registration</h1>
        <div class="team-inputs">
            <div class="team-box">
                <h3>Team 1</h3>
                <textarea id="team1-names" placeholder="Alice&#10;Bob"></textarea>
            </div>
            <div class="team-box">
                <h3>Team 2</h3>
                <textarea id="team2-names" placeholder="David&#10;Eve"></textarea>
            </div>
        </div>
        <button onclick="startGame()">Start Challenge</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="score-board">
            <div>Team 1: <span id="score1" class="score-val">0</span></div>
            <div>Round: <span id="round-counter">1</span> / 10</div>
            <div>Team 2: <span id="score2" class="score-val">0</span></div>
        </div>

        <div id="turn-text" style="color:var(--secondary-color); font-weight: bold; font-size: 1.2em; margin-bottom: 10px;">Turn: Team 1</div>

        <div id="bet-section">
            <p>Point Wager (10 - 100):</p>
            <input type="number" id="point-bet" min="10" max="100" placeholder="50">
            <br>
            <button onclick="getWord()">Get Word</button>
        </div>

        <div id="choice-section" style="display:none;">
            <h2 id="mode-title" style="color:var(--challenge-color)">CHOOSE MODE:</h2>
            <button onclick="setMode('normal')">Just Translate</button>
            <button class="btn-challenge" onclick="setMode('sentence')">Sentence Challenge (+15 Bonus)</button>
        </div>

        <div id="question-section" style="display: none;">
            <div class="word-display" id="english-word">WORD</div>
            <p id="instruction-text">Translation?</p>
            <input type="text" id="answer-input" placeholder="Type here...">
            <br>
            <button onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-text">Game Over!</h1>
        <h2 id="final-scores"></h2>
        <button onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    // ==============================================
    // BURAYA apı
    const GEMINI_API_KEY = "AIzaSyB_TR-8OEXxRgF7NjDqCyJpPYv8W7CJWds";
    // ==============================================

    const wordBank = {
        easy: [
            { en: "anymore", tr: "artık, daha fazla" }, { en: "arrival", tr: "varış, geliş" }, { en: "both", tr: "ikisi de, her ikisi" },
            { en: "call", tr: "aramak, çağırmak, adlandırmak" }, { en: "conversation", tr: "sohbet, konuşma" }, { en: "dress up", tr: "giyinmek, süslenmek" },
            { en: "elder", tr: "yaşlı, büyük, yaşça büyük" }, { en: "grocery", tr: "bakkal, market, manav" }, { en: "honest", tr: "dürüst, doğru" },
            { en: "leafy", tr: "yapraklı" }, { en: "salty", tr: "tuzlu" }, { en: "search engine", tr: "arama motoru" },
            { en: "similar", tr: "benzer" }, { en: "sour", tr: "ekşi" }, { en: "spicy", tr: "baharatlı, acı" },
            { en: "square", tr: "meydan, kare" }, { en: "take off", tr: "çıkarmak, havalanmak" }, { en: "bitter", tr: "acı, keskin" },
            { en: "bookworm", tr: "kitap kurdu" }
        ],
        medium: [
            { en: "admire", tr: "hayran olmak, beğenmek" }, { en: "alike", tr: "benzer, aynı, eş" }, { en: "community", tr: "topluluk, camia, halk" },
            { en: "competition", tr: "yarışma, rekabet" }, { en: "disappear", tr: "kaybolmak, yok olmak" }, { en: "dull", tr: "sıkıcı, donuk, mat" },
            { en: "effectively", tr: "etkili bir şekilde" }, { en: "especially", tr: "özellikle, bilhassa" }, { en: "foundation", tr: "vakıf, temel, kuruluş" },
            { en: "generation", tr: "nesil, kuşak" }, { en: "handcraft", tr: "el işi, el sanatı" }, { en: "innovation", tr: "yenilik, inovasyon" },
            { en: "invention", tr: "icat, buluş" }, { en: "look up", tr: "aramak, sözlüğe bakmak" }, { en: "loose", tr: "gevşek, bol" },
            { en: "manner", tr: "tavır, tarz, biçim" }, { en: "nutritious", tr: "besleyici, gıdalı" }, { en: "opportunity", tr: "fırsat, imkan" },
            { en: "pastry", tr: "hamur işi, börek, pasta" }, { en: "plain", tr: "sade, düz, yalın" }, { en: "preserve", tr: "korumak, muhafaza etmek" },
            { en: "resist", tr: "direnmek, karşı koymak" }, { en: "announce", tr: "duyurmak, ilan etmek" }, { en: "consume", tr: "tüketmek, bitirmek" },
            { en: "exact", tr: "tam, kesin" }, { en: "feast", tr: "bayram, şölen, ziyafet" }, { en: "firework", tr: "havai fişek" },
            { en: "ignore", tr: "görmezden gelmek, yok saymak" }, { en: "influence", tr: "etki, etkilemek" }, { en: "investment", tr: "yatırım" },
            { en: "no matter", tr: "fark etmez, önemi yok" }, { en: "parade", tr: "geçit töreni, tören" }, { en: "pickle", tr: "turşu" },
            { en: "sculpture", tr: "heykel, heykelcik" }, { en: "statue", tr: "heykel, anıt" }, { en: "torch", tr: "el feneri, meşale" },
            { en: "universal", tr: "evrensel" }, { en: "vinegar", tr: "sirke" }
        ],
        hard: [
            { en: "carpet weaving", tr: "halı dokuma" }, { en: "close-fitting", tr: "dar, vücuda oturan, sıkı" }, { en: "coincidence", tr: "tesadüf, rastlantı" },
            { en: "conservative", tr: "muhafazakar, tutucu" }, { en: "copper work", tr: "bakır işi, bakırcılık" }, { en: "craftsman", tr: "usta, zanaatkar, esnaf" },
            { en: "descendant", tr: "soyundan gelen, torun" }, { en: "embroidery", tr: "nakış, işleme" }, { en: "fertile", tr: "verimli, bereketli" },
            { en: "gas lantern", tr: "gaz lambası, gaz feneri" }, { en: "oriental", tr: "doğuya özgü, oryantal" }, { en: "pottery", tr: "çömlekçilik" },
            { en: "revolutionary", tr: "devrimci, köklü" }, { en: "brine", tr: "salamura, tuzlu su" }, { en: "component", tr: "parça, bileşen, eleman" },
            { en: "digestive", tr: "sindirim, hazım" }, { en: "diverse", tr: "çeşitli, farklı" }, { en: "enthusiastically", tr: "hevesle, coşkuyla" },
            { en: "intensive", tr: "yoğun" }, { en: "municipality", tr: "belediye" }, { en: "parsley", tr: "maydanoz" },
            { en: "recite", tr: "ezbere okumak, anlatmak" }, { en: "sentimental", tr: "duygusal, hisli" }, { en: "sovereignty", tr: "egemenlik, hakimiyet" },
            { en: "spiritual", tr: "ruhani, manevi" }, { en: "utensil", tr: "mutfak eşyası, kap kacak" }
        ]
    };

    let scores = [0, 0], currentTurn = 0, turnCount = 0, currentWordObj = null, currentPoints = 0, isSentenceMode = false;

    function showToast(message, type = 'success') {
        const t = document.getElementById("toast");
        t.innerText = message;
        t.className = "show " + type;
        setTimeout(() => t.className = "", 3500);
    }

    function switchScreen(hide, show) {
        document.getElementById(hide).classList.remove('active');
        setTimeout(() => document.getElementById(show).classList.add('active'), 400);
    }

    function startGame() {
        if(!document.getElementById('team1-names').value.trim() || !document.getElementById('team2-names').value.trim()){
            showToast("Enter names for both teams!", "error"); return;
        }
        switchScreen('setup-screen', 'game-screen');
        updateUI();
    }

    function getWord() {
        currentPoints = parseInt(document.getElementById('point-bet').value);
        if (isNaN(currentPoints) || currentPoints < 10 || currentPoints > 100) {
            showToast("Wager must be 10-100!", "error"); return;
        }
        let d = currentPoints <= 40 ? "easy" : currentPoints <= 70 ? "medium" : "hard";
        currentWordObj = wordBank[d][Math.floor(Math.random() * wordBank[d].length)];

        document.getElementById('bet-section').style.display = 'none';
        document.getElementById('choice-section').style.display = 'block';
        document.getElementById('mode-title').innerText = d === "hard" ? "🔥 HARD WORD! SELECT MODE:" : "CHOOSE MODE:";
    }

    function setMode(m) {
        isSentenceMode = m === 'sentence';
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('question-section').style.display = 'block';
        document.getElementById('english-word').innerText = currentWordObj.en;
        document.getElementById('instruction-text').innerText = isSentenceMode ? "Write a sentence using this word:" : "Turkish translation?";
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    }

    async function checkSentenceWithAI(sentence, word) {
        const overlay = document.getElementById('checking-overlay');
        overlay.classList.add('show');
        try {
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=AIzaSyB_TR-8OEXxRgF7NjDqCyJpPYv8W7CJWds,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are a strict English grammar checker for a vocabulary game.
The target word is: "${word}"	
The student wrote: "${sentence}"

Check if this sentence is grammatically correct English AND properly uses the word "${word}".
Reply ONLY with this exact JSON format, nothing else, no markdown:
{"valid": true, "reason": "Doğru kullanım"}
or
{"valid": false, "reason": "Kısa Türkçe sebep (max 6 kelime)"}`
                            }]
                        }],
                        generationConfig: { temperature: 0.1, maxOutputTokens: 100 }
                    })
                }
            );

            if (!response.ok) {
                const err = await response.json();
                console.error("Gemini API error:", err);
                return { valid: false, reason: "API bağlantı hatası" };
            }

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text.trim();
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) return { valid: false, reason: "Yanıt parse edilemedi" };
            return JSON.parse(match[0]);
        } catch(e) {
            console.error("Fetch error:", e);
            return { valid: false, reason: "Bağlantı hatası" };
        } finally {
            overlay.classList.remove('show');
        }
    }

    async function checkAnswer() {
        const userVal = document.getElementById('answer-input').value.trim().toLowerCase();
        const correctTr = currentWordObj.tr.toLowerCase();
        const acceptableAnswers = correctTr.split(',').map(ans => ans.trim());

        if (!isSentenceMode) {
            if (acceptableAnswers.includes(userVal)) {
                scores[currentTurn] += currentPoints;
                showToast(`Correct! +${currentPoints} pts`, "success");
            } else {
                showToast(`Wrong! Correct was: ${currentWordObj.tr}`, "error");
            }
            nextTurn();
        } else {
            const raw = document.getElementById('answer-input').value.trim();
            if (!raw) { showToast("Write a sentence first!", "error"); return; }
            const result = await checkSentenceWithAI(raw, currentWordObj.en);
            if (result.valid) {
                const bonus = currentPoints + 15;
                scores[currentTurn] += bonus;
                showToast(`Perfect sentence! +${bonus} pts`, "success");
            } else {
                scores[currentTurn] = Math.max(0, scores[currentTurn] - 10);
                showToast(`Invalid: ${result.reason} (-10 pts)`, "error");
            }
            nextTurn();
        }
    }

    function nextTurn() {
        turnCount++;
        currentTurn = currentTurn === 0 ? 1 : 0;
        setTimeout(() => {
            if (turnCount >= 10) endGame();
            else { resetUI(); updateUI(); }
        }, 2500);
    }

    function resetUI() {
        document.getElementById('bet-section').style.display = 'block';
        document.getElementById('question-section').style.display = 'none';
        document.getElementById('choice-section').style.display = 'none';
        document.getElementById('point-bet').value = '';
    }

    function updateUI() {
        document.getElementById('score1').innerText = scores[0];
        document.getElementById('score2').innerText = scores[1];
        document.getElementById('turn-text').innerText = "Turn: Team " + (currentTurn + 1);
        document.getElementById('round-counter').innerText = Math.floor(turnCount / 2) + 1;
    }

    function endGame() {
        switchScreen('game-screen', 'result-screen');
        const winTxt = document.getElementById('winner-text');
        if (scores[0] > scores[1]) winTxt.innerText = "🏆 Team 1 Wins! 🏆";
        else if (scores[1] > scores[0]) winTxt.innerText = "🏆 Team 2 Wins! 🏆";
        else winTxt.innerText = "🤝 Draw Game! 🤝";
        document.getElementById('final-scores').innerText = `${scores[0]} - ${scores[1]}`;
    }
</script>
</body>
</html>
